version: "3.8"

services:
  # -------------------------------------------------------
  # TLS終端用 リバースプロキシ (nginx)
  # -------------------------------------------------------
  proxy:
    image: nginx:stable
    container_name: shining-will-shop-proxy
    restart: unless-stopped
    ports:
      - "80:80" # HTTP（自動リダイレクト用）
      - "443:443" # HTTPS公開
    volumes:
      # nginx仮想ホスト設定
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      # 証明書・秘密鍵（mkcert または Let's Encrypt）
      - ./docker/ssl:/etc/nginx/ssl:ro
      # Laravelのpublicディレクトリをマウント
      - ./:/var/www/html
    depends_on:
      - laravel.test
    networks:
      - sail

  # -------------------------------------------------------
  # Queue Worker（非同期処理）
  # -------------------------------------------------------
  worker:
    image: 'sail-8.4/app'
    container_name: shining-will-shop-worker
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      QUEUE_CONNECTION: database
      WAIT_DB_RETRIES: '120'
      WAIT_DB_SLEEP: '2'
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-laravel}
      DB_USERNAME: ${DB_USERNAME:-sail}
      DB_PASSWORD: ${DB_PASSWORD:-password}
    entrypoint: [ "/bin/sh", "-lc", "/var/www/html/docker/wait-for-db.sh && exec php artisan queue:work --sleep=3 --tries=3 --timeout=90" ]
    volumes:
      - ./:/var/www/html
      - ./docker/wait-for-db.sh:/var/www/html/docker/wait-for-db.sh
    depends_on:
      - mysql
      - redis
    networks:
      - sail

networks:
  sail:
    external: true
    name: shining-will-shop_sail

name: CI - Test db:seed

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test-seed:
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      DB_CONNECTION: sqlite
      DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
      APP_KEY: base64:CiRANDOMPLACEHOLDERGENERATEINJOB==
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - show workspace
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          pwd
          ls -la
          echo "Contents of repo root:"
          ls -la $GITHUB_WORKSPACE || true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, sqlite, pdo_sqlite, xml
          coverage: none

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies (composer)
        run: |
          composer install --no-progress --prefer-dist --no-interaction
        # working-directory: ./subdir  # <-- if your composer.json is not at repo root, set this to the correct path

      - name: Prepare sqlite DB file
        run: |
          mkdir -p database
          touch database/database.sqlite
          chmod 664 database/database.sqlite
          ls -la database

      - name: App key & config clear
        run: |
          php artisan key:generate --ansi || true
          php artisan config:clear

      - name: Run migrations and seed
        run: |
          php artisan migrate:fresh --seed --force

      - name: Re-run seed to test idempotency and verify
        run: |
          php artisan db:seed --force
          php artisan tinker --execute="echo \\DB::table('products')->where('sku','TEST-001')->count();"
          php artisan tinker --execute="echo \\DB::table('users')->whereIn('email',['admin@example.com','test@example.com'])->count();"

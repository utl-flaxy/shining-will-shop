name: CI - Test db:seed
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test-seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, zip
          coverage: none

      - name: Debug: show PHP and Composer versions
        run: |
          echo "--- php -v ---"
          php -v || true
          echo "--- which php ---"
          which php || true
          echo "--- PHP constants ---"
          php -r 'echo "PHP_VERSION=" . PHP_VERSION . "\nPHP_BINARY=" . PHP_BINARY . "\nPHP_OS=" . PHP_OS . "\nPHP_SAPI=" . PHP_SAPI . "\n";'
          echo "--- composer --version ---"
          composer --version || echo 'composer not found'
          echo "--- composer diagnose ---"
          composer diagnose || true

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction --optimize-autoloader

    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: testing
      DB_USERNAME: root
      DB_PASSWORD: root

    steps:
      # ✅ 必ず最初に checkout
      - name: 🧰 Checkout repository
        uses: actions/checkout@v4

      # 🔍 デバッグ用（composer.jsonの位置確認）
      - name: 🧭 Debug - show workspace
        run: |
          pwd
          ls -la
          echo "----- composer.json check -----"
          find . -maxdepth 2 -type f -name composer.json || true

      # ✅ PHP セットアップ
      - name: ⚙️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, pdo_mysql, xml, bcmath
          ini-values: post_max_size=256M, memory_limit=2G

      # ✅ composer install は checkout 後に！
      - name: 📦 Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: ⚙️ Copy .env
        run: |
          if [ -f .env.example ]; then cp .env.example .env; fi

      - name: 🔑 Generate app key
        run: php artisan key:generate --ansi

      - name: 💤 Wait for MySQL
        run: |
          for i in {1..30}; do
            php -r "exit((int)!(@mysqli_connect('127.0.0.1','root','root')));" && break
            echo "⏳ Waiting for MySQL..."
            sleep 2
          done
          echo "✅ MySQL is ready."

      - name: 🧱 Run migrations and seed
        run: |
          php artisan migrate:fresh --force
          php artisan db:seed --force

      - name: 🔁 Re-run seed (idempotency check)
        run: php artisan db:seed --force

      - name: 🔍 Verify product duplication
        run: |
          sudo apt-get update && sudo apt-get install -y default-mysql-client
          COUNT=$(mysql -h 127.0.0.1 -uroot -proot -D testing -N -s -e "SELECT COUNT(*) FROM products WHERE sku='TEST-001';")
          echo "PRODUCT_COUNT=$COUNT"
          if [ -z "$COUNT" ]; then echo "❌ products table not found or query failed"; exit 1; fi
          if [ "$COUNT" -gt 1 ]; then echo "❌ Duplicate product entries found"; exit 1; fi
          echo "✅ Idempotency check passed."

name: AI Auto Dev (Safe Mode)

on:
  push:
    branches: [ "dev" ]   # ← mainではなくdevブランチだけで動く
  workflow_dispatch:       # ← 手動実行も可（GitHub Actions画面から）

jobs:
  ai_auto_dev:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ コード取得
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ PHP環境構築
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none

      # 3️⃣ Composer依存関係インストール
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      # 4️⃣ 仕様書とルール確認
      - name: Display spec and rules
        run: |
          echo "=== SPEC FILE ==="
          cat docs/spec.md || echo "⚠️ docs/spec.md が見つかりません"
          echo "=== PROMPT FILE ==="
          cat .github/prompts/filament_resource_prompt.md || echo "⚠️ プロンプトが見つかりません"

      # 5️⃣ AIコード生成（仕様を読み込み）
      - name: Run AI Code Generator
        id: ai_gen
        uses: openai-labs/ai-dev-action@v1
        with:
          model: gpt-5
          prompt: |
            /docs/spec.md と /.github/prompts/filament_resource_prompt.md を参照して、
            Shining-Will-Shop（Laravel + Filament）のコードを生成または修正せよ。
            コード変更は dev ブランチで行い、仕様逸脱があれば自動修正する。
            生成対象：
            - Product, ProductVariant, Order, OrderItem, Payment のModel/Migration/FilamentResource
            - ChartWidgetによる売上可視化
            - ExportActionによるExcel出力
            - Refund APIの実装スタブ
            テストが通るまで修正を繰り返せ。

      # 6️⃣ Laravelテスト実行
      - name: Run Laravel Tests
        id: test
        run: |
          cp .env.example .env || true
          php artisan key:generate
          php artisan migrate --force
          php artisan test || echo "TEST_FAILED" > test_status.txt

      # 7️⃣ 失敗時リトライ（最大5回）
      - name: Retry on failure
        if: always()
        run: |
          attempt=1
          while [ -f test_status.txt ]; do
            echo "⚠️ テスト失敗 → 再生成リトライ ($attempt 回目)"
            rm test_status.txt
            sleep 5
            gh workflow run "AI Auto Dev (Safe Mode)"
            ((attempt++))
            if [ $attempt -gt 5 ]; then
              echo "❌ 5回リトライしても失敗。人間レビューが必要です。"
              exit 1
            fi
          done

      # 8️⃣ 成功時 → PR作成（mainへのマージはしない）
      - name: Create Pull Request
        if: success()
        run: |
          git config user.name "AI AutoDev"
          git config user.email "bot@shining-will.shop"
          branch_name="ai-autofix-$(date +%s)"
          git checkout -b "$branch_name"
          git add .
          git commit -m "🤖 AI AutoFix: code updated (safe mode)"
          git push origin HEAD
          gh pr create \
            --title "🤖 AI AutoFix" \
            --body "AIが仕様書 (/docs/spec.md) に基づき自動生成した更新です。レビュー後、mainにマージしてください。" \
            --base main

name: Auto Dev Safe

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  test-and-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, sqlite3, pdo_sqlite
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Create .env file
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
          php artisan config:clear
          php artisan cache:clear

      - name: Prepare database
        run: php artisan migrate:fresh --seed --force

      - name: Run tests with retry (up to 10 attempts)
        run: |
          for i in {1..10}; do
            echo "🧪 Running test attempt $i..."
            php artisan test && break
            echo "⚠️ Test failed on attempt $i. Retrying..."
            sleep 10
          done

      - name: Auto merge to main if tests pass
        if: success()
        uses: devmasx/merge-branch@v1.4.0
        with:
          type: now
          from_branch: dev
          target_branch: main
          github_token: ${{ secrets.GITHUB_TOKEN }}

name: 🧪 Auto Dev Safe (10x Retry + Auto Merge)

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1️⃣ リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ PHP環境セットアップ
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, sqlite3, bcmath, intl, fileinfo
          tools: composer:v2

      # 3️⃣ Composer 依存関係インストール
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # 4️⃣ .env.testing の作成
      - name: Create .env.testing
        run: |
          echo "APP_ENV=testing" > .env.testing
          echo "APP_KEY=base64:$(php artisan key:generate --show)" >> .env.testing
          echo "APP_DEBUG=true" >> .env.testing
          echo "DB_CONNECTION=sqlite" >> .env.testing
          echo "DB_DATABASE=:memory:" >> .env.testing
          echo "CACHE_DRIVER=array" >> .env.testing
          echo "SESSION_DRIVER=array" >> .env.testing
          echo "QUEUE_CONNECTION=sync" >> .env.testing
          echo "MAIL_MAILER=array" >> .env.testing
          cat .env.testing

      # 5️⃣ テスト＋自動再試行ロジック（最大10回）
      - name: Run tests with retry (max 10 attempts)
        run: |
          for i in {1..10}; do
            echo "🧪 Running test attempt $i..."
            php artisan migrate:fresh --env=testing --seed
            if php artisan test --env=testing; then
              echo "✅ Tests passed on attempt $i!"
              exit 0
            else
              echo "⚠️ Test failed on attempt $i. Retrying in 10 seconds..."
              sleep 10
            fi
          done
          echo "❌ Tests failed after 10 attempts."
          exit 1

      # 6️⃣ main に自動マージ（dev成功時）
      - name: Auto merge dev -> main (if tests passed)
        if: github.ref == 'refs/heads/dev' && success()
        uses: devmasx/merge-branch@v1.4.0
        with:
          type: now
          from_branch: dev
          target_branch: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7️⃣ Slack/Discord通知（任意）
      # - name: Notify success or failure
      #   if: always()
      #   run: |
      #     echo "CI result: ${{ job.status }}"

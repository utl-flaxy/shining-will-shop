name: 🧪 Auto Dev Safe (SQLite + 10x Retry + Auto Merge)

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, sqlite3, bcmath, intl, fileinfo
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Create .env.testing
        run: |
          echo "APP_ENV=testing" > .env.testing
          echo "APP_KEY=base64:$(php artisan key:generate --show)" >> .env.testing
          echo "APP_DEBUG=true" >> .env.testing
          echo "DB_CONNECTION=sqlite" >> .env.testing
          echo "DB_DATABASE=:memory:" >> .env.testing
          echo "CACHE_DRIVER=array" >> .env.testing
          echo "SESSION_DRIVER=array" >> .env.testing
          echo "QUEUE_CONNECTION=sync" >> .env.testing
          echo "MAIL_MAILER=array" >> .env.testing
          cat .env.testing

      # 🧩 migrateとtestを同一PHPプロセスで実行するように変更！
      - name: Run tests with SQLite in-memory DB (10x retry)
        run: |
          for i in {1..10}; do
            echo "🧪 Running tests (attempt $i)..."
            php -r "
              echo \"[MIGRATE & TEST in same process]\\n\";
              require 'vendor/autoload.php';
              passthru('php artisan migrate:fresh --seed --env=testing');
              passthru('php artisan test --env=testing', \$exit);
              exit(\$exit);
            "
            if [ $? -eq 0 ]; then
              echo '✅ Tests passed successfully.'
              exit 0
            else
              echo '⚠️ Test failed, retrying in 10 seconds...'
              sleep 10
            fi
          done
          echo '❌ All 10 attempts failed.'
          exit 1

      - name: Auto merge dev → main
        if: github.ref == 'refs/heads/dev' && success()
        uses: devmasx/merge-branch@v1.4.0
        with:
          type: now
          from_branch: dev
          target_branch: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

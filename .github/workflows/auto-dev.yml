name: AI Auto Development

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  ai_auto_dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist
          mkdir -p docs
          mkdir -p .github/prompts

      - name: Show current spec
        run: |
          echo "=== /docs/spec.md ==="
          cat docs/spec.md || echo "No spec found!"
          echo "=== /github/prompts/filament_resource_prompt.md ==="
          cat .github/prompts/filament_resource_prompt.md || echo "No prompt found!"

      - name: Run AI Code Generator
        id: ai_gen
        uses: openai-labs/ai-dev-action@v1
        with:
          model: gpt-5
          prompt: |
            以下の仕様書を厳守してコードを生成・修正せよ：
            - /docs/spec.md
            - /.github/prompts/filament_resource_prompt.md

            目的：
            Shining-Will-Shop（Laravel + Filament）を完全ノーコード運用可能にする。
            仕様書準拠でProduct, ProductVariant, Order, OrderItem, PaymentのResource・モデル・マイグレーションを生成。

            要件：
            - Laravel 11 / PHP 8.2 / Filament 3.x
            - リレーション、enumステータス、ExportAction、ChartWidget、Refund APIを実装
            - コード変更後、テストが通るまでリトライする

      - name: Run Laravel Tests
        id: run_tests
        run: |
          cp .env.example .env || true
          php artisan key:generate
          php artisan migrate --force
          php artisan test || echo "TEST_FAILED" > test_status.txt

      - name: Retry on failure
        if: always()
        run: |
          attempt=1
          while [ -f test_status.txt ]; do
            echo "⚠️ Test failed, retrying... Attempt $attempt"
            rm test_status.txt
            gh workflow run AI Auto Development
            ((attempt++))
            if [ $attempt -gt 10 ]; then
              echo "❌ 10回リトライしても解決しませんでした。"
              exit 1
            fi
          done

      - name: Commit and push changes
        if: success()
        run: |
          git config user.name "AI AutoDev"
          git config user.email "bot@shining-will.shop"
          git add .
          git commit -m "🤖 AI AutoFix: code updated and tests passed"
          git push origin main

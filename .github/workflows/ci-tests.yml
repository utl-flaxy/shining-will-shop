name: CI Tests
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  tests:
    name: Run PHPUnit Feature tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, zip
          coverage: none

      - name: Debug: show PHP and Composer versions
        run: |
          echo "--- php -v ---"
          php -v || true
          echo "--- which php ---"
          which php || true
          echo "--- php info from PHP constants ---"
          php -r 'echo "PHP_VERSION=" . PHP_VERSION . "\n" . "PHP_BINARY=" . PHP_BINARY . "\n" . "PHP_OS=" . PHP_OS . "\n" . "PHP_SAPI=" . PHP_SAPI . "\n";'
          echo "--- composer --version ---"
          composer --version || echo 'composer not found'
          echo "--- composer diagnose ---"
          composer diagnose || true

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction --optimize-autoloader

      - name: Run PHPUnit (Feature)
        run: |
          if [ -f vendor/bin/phpunit ]; then
            vendor/bin/phpunit --testsuite=Feature || true
          else
            echo "phpunit not installed"
          fi

name: CI - Pest & PHPUnit Tests

on:
  push:
    branches: [ main, ci/*, feature/* ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, sqlite, bcmath, fileinfo
          coverage: none

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Show PHP and Composer versions
        run: |
          php -v
          composer --version
          which php

      - name: Run Pest or PHPUnit tests
        run: |
          if [ -f "vendor/bin/pest" ]; then
            echo "Running Pest tests..."
            vendor/bin/pest --colors=always
          else
            echo "Pest not found. Running PHPUnit tests..."
            vendor/bin/phpunit --colors=always
          fi

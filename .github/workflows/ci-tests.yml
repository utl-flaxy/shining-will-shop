name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, pdo_sqlite, sqlite3

      - name: Get composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer deps
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist --no-interaction --optimize-autoloader

      - name: Generate optimized autoload
        run: composer dump-autoload -o

      - name: Prepare sqlite testing database
        run: |
          mkdir -p database
          touch database/testing.sqlite

      - name: Clear caches
        run: |
          php artisan config:clear || true
          php artisan cache:clear || true

      - name: Run migrations (testing)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ${{ github.workspace }}/database/testing.sqlite
          APP_ENV: testing
        run: php artisan migrate --env=testing --force

      - name: Run PHPUnit tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ${{ github.workspace }}/database/testing.sqlite
          APP_ENV: testing
        run: php artisan test --no-interaction --testsuite=Feature

name: Nightly AI Auto Fix (Safe Staging)

on:
  schedule:
    - cron: "0 18 * * *" # JSTで毎日3:00実行（UTC18:00）
  workflow_dispatch:

jobs:
  ai-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run AI auto-fix
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 - <<'PYCODE'
          import openai, os, subprocess, pathlib

          openai.api_key = os.getenv("OPENAI_API_KEY")

          diff = subprocess.getoutput("git diff HEAD~3..HEAD")
          if not diff.strip():
              print("No diff detected, skipping.")
              exit(0)

          prompt = f"""
          あなたはLaravel/Filament専門の上級エンジニアです。
          以下の差分を解析し、必要な修正コードを提案・適用できる形で生成してください。
          ただし、ファイル削除や環境設定ファイル（.env、docker-compose.yml、config/*）の変更は行わないでください。
          ----
          {diff}
          """

          res = openai.chat.completions.create(
              model="gpt-5",
              messages=[{"role": "user", "content": prompt}],
          )
          output = res.choices[0].message.content
          pathlib.Path("AI_PATCH.txt").write_text(output)
          PYCODE

      - name: Apply AI patch
        run: |
          if [ -f AI_PATCH.txt ]; then
            echo "Applying AI patch..."
            git apply --reject --whitespace=fix AI_PATCH.txt || true
          else
            echo "No patch file found."
          fi

      - name: Commit and push to ai-staging
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "AI Bot"
            git config user.email "ai-bot@example.com"
            branch="ai-autofix-$(date +%Y%m%d)"
            git checkout -b "$branch"
            git add .
            git commit -m "🤖 AI Auto Fix ($(date +%Y-%m-%d))"
            git push origin HEAD:ai-staging
          else
            echo "No changes to commit."
          fi

      - name: Create Pull Request to ai-staging
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ai-staging
          title: "🤖 Nightly AI Auto Fix ($(date +%Y-%m-%d))"
          body: "AIが安全に修正を適用しました。内容を確認してmainへマージしてください。"
          branch: "ai-autofix-$(date +%Y%m%d)"
